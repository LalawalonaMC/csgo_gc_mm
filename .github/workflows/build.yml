name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false # Prevents one OS failure from canceling others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]
    runs-on: ${{ matrix.os }}
    
    env:
      SCCACHE_GHA_ENABLED: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Ninja & CMake
      uses: lukka/get-cmake@latest

    - if: matrix.os != 'windows-latest'
      name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.9

    - if: matrix.os == 'ubuntu-latest'
      name: Dependencies (Linux)
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt install --yes --no-install-recommends gcc-multilib g++-multilib

    - if: matrix.os == 'ubuntu-latest'
      name: Build Linux
      run: |
        mkdir -p release
        # Build main plugin
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DOUTDIR=$GITHUB_WORKSPACE/release .
        cmake --build build --target csgo csgo_gc
        # Build DS
        cmake -G Ninja -B build_ds -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32 -DOUTDIR=$GITHUB_WORKSPACE/release .
        cmake --build build_ds --target srcds csgo_gc

    - if: matrix.os == 'macos-latest'
      name: Build macOS
      run: |
        mkdir -p release
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_OSX_ARCHITECTURES=x86_64 -DFUNCHOOK_CPU=x86 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DOUTDIR=$GITHUB_WORKSPACE/release .
        cmake --build build --target csgo csgo_gc

    - if: matrix.os == 'windows-latest'
      name: Build Windows
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "release"
        cmake -A Win32 -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DOUTDIR="$env:GITHUB_WORKSPACE/release" .
        cmake --build build --config ${{ matrix.build_type }} --target csgo srcds csgo_gc

    - name: Package
      shell: bash
      run: |
        mkdir -p release/licenses
        cp README.md release/ || true
        cp LICENSE release/licenses/LICENSE-csgo_gc.txt || true
        # Find potential licenses in build deps
        find build/_deps -name "License.txt" -path "*cryptopp*" -exec cp {} release/licenses/LICENSE-crypto++.txt \; || true
        find build/_deps -name "COPYING" -path "*distorm*" -exec cp {} release/licenses/LICENSE-distorm.txt \; || true
        cp -r examples/*.txt release/csgo_gc/ || true

    - name: Zip artifacts
      shell: bash
      run: |
        OUTNAME="csgo_gc-${{ matrix.os }}.zip"
        cd release && zip -r "../$OUTNAME" .
        echo "OUTNAME=$OUTNAME" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: artifact-${{ matrix.os }}
        path: csgo_gc-${{ matrix.os }}.zip

  publish:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Create continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="continuous"
          files=$(find all_artifacts -type f -name "*.zip")
          if [ -n "$files" ]; then
            gh release delete "$TAG" --cleanup-tag --yes || true
            sleep 5s 
            gh release create "$TAG" --title "Continuous Build" --notes "SHA: ${{ github.sha }}" --target "main"
            gh release upload "$TAG" $files --clobber
          fi
